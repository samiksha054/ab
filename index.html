<!DOCTYPE html>
<html>
<head>
    <title>AJAX Search Suggestion</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <style>
        #suggestions {
            border: 1px solid #ccc;
            max-width: 300px;
            display: none;
            position: absolute;
            background: white;
        }

        .suggestion-item {
            padding: 8px;
            cursor: pointer;
        }

        .suggestion-item:hover {
            background: #f2f2f2;
        }
    </style>
</head>

<body>

<input type="text" id="search" placeholder="Search..." autocomplete="off">
<div id="suggestions"></div>

</body>
</html>
